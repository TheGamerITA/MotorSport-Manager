<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Motorsport Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="screen-start" class="screen active"></section>
    <section id="screen-newcareer" class="screen"></section>
    <section id="screen-app" class="screen">
        <div id="app">
            <header id="topbar">
                <div class="brand">
                    <span class="logo-mark"></span>
                    <div>
                        <h1>ULTIMATE MOTORSPORT MANAGER</h1>
                        <div class="brand-sub">Master Control Room</div>
                    </div>
                </div>
                <button class="btn-ghost" id="btnQuitCareer" style="margin-left: 20px;">⏏ Back to Menu</button>
                <button class="btn-ghost" id="btnSaveGame" style="margin-left: 10px;">💾 Save</button>
                <div class="global-stats" id="globalStats"></div>
            </header>
            
            <nav id="sidebar">
                <button class="nav-btn active" data-view="race"><span class="nav-ico ico-race"></span> Weekend</button>
                <button class="nav-btn" data-view="team"><span class="nav-ico ico-team"></span> Team</button>
                <button class="nav-btn" data-view="rnd"><span class="nav-ico ico-rnd"></span> R&D</button>
                <button class="nav-btn" data-view="scout"><span class="nav-ico ico-scout"></span> Scouting</button>
                <button class="nav-btn" data-view="finance"><span class="nav-ico ico-finance"></span> Finance</button>
                <button class="nav-btn" data-view="sponsors"><span class="nav-ico ico-finance"></span> Sponsors</button>
                <button class="nav-btn" data-view="standings"><span class="nav-ico ico-standings"></span> Standings</button>
                <button class="nav-btn" data-view="calendar"><span class="nav-ico ico-calendar"></span> Calendar</button>
            </nav>

            <main id="content">
                <div id="view-race" class="view active">
                    <div class="panel-head">
                        <h2>Weekend Simulation</h2>
                        <div class="panel-actions">
                            <button class="primary" id="simBtn">SIMULATE NEXT SESSION</button>
                        </div>
                    </div>
                    <div class="meta-bar" id="raceMeta"></div>
                    
                    <div class="card" style="padding: 10px; margin-bottom: 16px;">
                        <canvas id="raceCanvas" width="1000" height="500" style="width:100%; height:auto; background:#060a10; border-radius:2px;"></canvas>
                        <div style="display:flex; gap:10px; padding:10px 0 0 0;">
                            <button class="btn-secondary" id="btn-play">Play</button>
                            <button class="btn-secondary" id="btn-pause">Pause</button>
                            <button class="btn-secondary" id="btn-reset">Reset</button>
                            <button class="btn-secondary" id="btn-speed">Speed: 1x</button>
                        </div>
                    </div>

                    <div class="card">
                        <h3>Session Results</h3>
                        <div class="table-wrap">
                            <table class="data-table" id="resultsTable">
                                <thead></thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card">
                        <h3>Event Log</h3>
                        <div class="log-box" id="raceLog"></div>
                    </div>
                </div>

                <div id="view-team" class="view"><div class="panel-head"><h2>Your Team</h2></div><div class="grid-cards" id="teamContent"></div></div>
                <div id="view-rnd" class="view"><div class="panel-head"><h2>Research & Development</h2></div><div class="card" id="rndContent"></div></div>
                <div id="view-scout" class="view"><div class="panel-head"><h2>Academy & Scouting</h2><button class="primary" id="scoutBtn">START SCOUTING (€50k)</button></div><div class="grid-cards" id="scoutContent"></div></div>
                <div id="view-finance" class="view"><div class="panel-head"><h2>Financial Management</h2></div><div id="financeContent"></div></div>
                <div id="view-sponsors" class="view"><div class="panel-head"><h2>Sponsor Management</h2></div><div id="sponsorsContent"></div></div>
                <div id="view-standings" class="view"><div class="panel-head"><h2>Championship Standings</h2></div><div id="standingsContent"></div></div>
                <div id="view-calendar" class="view"><div class="panel-head"><h2>Season Calendar</h2></div><div id="calendarContent"></div></div>
            </main>

            <footer id="statusbar"><span id="statusMsg">Ready.</span><span>Ultimate Motorsport Manager v1.0</span></footer>
        </div>
    </section>

    <script src="data/categoryConfigs.js"></script>
    <script src="data/teamsDrivers.js"></script>
    <script src="data/teams/f1Teams.js"></script>
    <script src="data/teams/f2Teams.js"></script>
    <script src="data/teams/f3Teams.js"></script>
    <script src="data/teams/feTeams.js"></script>
    <script src="data/teams/motogpTeams.js"></script>
    <script src="data/teams/wrcTeams.js"></script>
    <script src="data/teams/dakarTeams.js"></script>
    <script src="data/teams/f4_fregional.js"></script>
    <script src="data/teams/gt_endurance.js"></script>
    <script src="data/teams/touring_car.js"></script>
    <script src="data/teams/rally_regional.js"></script>
    <script src="data/teams/rallycross_offroad.js"></script>
    <script src="data/teams/raid.js"></script>
    <script src="data/teams/bike_senior_junior.js"></script>
    <script src="data/teams/offroad_bike.js"></script>
    <script src="data/teams/karting.js"></script>
    <script src="data/teams/special.js"></script>
    <script src="data/sponsors.js"></script>
    <script src="data/tracks.js"></script>
    <script src="engine/coreSimulation.js"></script>
    <script src="engine/raceAnimator.js"></script>
    <script src="engine/saveSystem.js"></script>
    <script src="engine/careerManager.js"></script>
    <script src="engine/screenManager.js"></script>
    <script src="engine/renderView.js"></script>
    <script src="ui/masterUI.js"></script>
    <script src="ui/screens/startScreen.js"></script>
    <script src="ui/screens/newCareerScreen.js"></script>
    <script src="ui/screens/createTeamScreen.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            try {
                if (typeof StartScreen !== 'undefined') StartScreen.init();
                if (typeof NewCareerScreen !== 'undefined') NewCareerScreen.init();
                if (typeof MasterUI !== 'undefined') MasterUI.init();
                
                if (typeof RenderView !== 'undefined') {
                    RenderView.init('raceCanvas');
                }

                // Button to return to menu
                const quitBtn = document.getElementById("btnQuitCareer");
                if(quitBtn) {
                    quitBtn.onclick = () => {
                        if(confirm("Do you want to return to the main menu? Progress is saved.")) {
                            if (typeof CareerManager !== 'undefined') CareerManager.close();
                            if (typeof ScreenManager !== 'undefined') ScreenManager.show('start');
                            if (typeof StartScreen !== 'undefined') StartScreen.render();
                        }
                    };
                }

                // Explicit Save button
                const saveBtn = document.getElementById("btnSaveGame");
                if(saveBtn) {
                    saveBtn.onclick = () => {
                        if (typeof CareerManager === 'undefined' || !CareerManager.isActive()) {
                            saveBtn.textContent = "💾 No career";
                            setTimeout(() => saveBtn.textContent = "💾 Save", 1500);
                            return;
                        }
                        try {
                            if (typeof CareerManager !== 'undefined' && CareerManager.save()) {
                                saveBtn.textContent = "✔ Saved!";
                            } else {
                                saveBtn.textContent = "✘ No career";
                            }
                            setTimeout(() => saveBtn.textContent = "💾 Save", 1500);
                        } catch(e) {
                            console.error("Save failed:", e);
                            saveBtn.textContent = "✘ Error";
                            setTimeout(() => saveBtn.textContent = "💾 Save", 1500);
                        }
                    };
                }

                if (typeof ScreenManager !== 'undefined') {
                    ScreenManager.show('start');
                    if (typeof StartScreen !== 'undefined') StartScreen.render();
                }
            } catch (e) { 
                console.error("Startup error:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px; font-family:monospace;">STARTUP ERROR: ${e.message}<br>Check that all JS files are present in the correct folders.</div>`;
            }
        });
    </script>
</body>
</html>
